name: Build and Publish Artifact

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean package -DskipTests
      env:
        BUILD_NUMBER: ${{ github.run_number }}
    
    - name: Extract version and artifact path
      id: artifact
      env:
        BUILD_NUMBER: ${{ github.run_number }}
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        JAR_FILE=$(ls target/demo-api-*.jar)
        CHECKSUM=$(sha256sum "$JAR_FILE" | awk '{print $1}')
        SIZE=$(stat -c%s "$JAR_FILE")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "jar_path=$JAR_FILE" >> $GITHUB_OUTPUT
        echo "sha256=$CHECKSUM" >> $GITHUB_OUTPUT
        echo "size=$SIZE" >> $GITHUB_OUTPUT
    
    - name: Upload to Artifact Manager
      env:
        ARTIFACT_MANAGER_URL: ${{ secrets.ARTIFACT_MANAGER_URL }}
        ARTIFACT_MANAGER_KEY: ${{ secrets.ARTIFACT_MANAGER_KEY }}
      run: |
        if [ -z "$ARTIFACT_MANAGER_URL" ]; then
          echo "::error::ARTIFACT_MANAGER_URL is not set. Configure it in Settings > Secrets and variables > Actions > Secrets."
          exit 1
        fi
        echo "URL length: ${#ARTIFACT_MANAGER_URL}"
        echo "URL starts with https: $(echo "$ARTIFACT_MANAGER_URL" | grep -c '^https://')"
        echo "URL contains localhost: $(echo "$ARTIFACT_MANAGER_URL" | grep -c 'localhost')"
        echo "URL contains trycloudflare: $(echo "$ARTIFACT_MANAGER_URL" | grep -c 'trycloudflare')"
        echo "Key length: ${#ARTIFACT_MANAGER_KEY}"
        echo "Key is empty: $([ -z "$ARTIFACT_MANAGER_KEY" ] && echo 'YES' || echo 'NO')"
        CLEAN_URL=$(echo "$ARTIFACT_MANAGER_URL" | tr -d '[:space:]')
        curl -v --fail-with-body -X POST "${CLEAN_URL}/api/ci/upload" \
          -H "X-API-Key: ${ARTIFACT_MANAGER_KEY}" \
          -F "file=@${{ steps.artifact.outputs.jar_path }}" \
          -F "artifactName=${{ github.event.repository.name }}" \
          -F "version=${{ steps.artifact.outputs.version }}" \
          -F "type=jar" \
          -F "branch=${{ github.ref_name }}" \
          -F "commitHash=${{ github.sha }}" \
          -F "buildNumber=${{ github.run_number }}" \
          -F "pipelineProvider=github-actions" \
          -F "pipelineUrl=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    
    - name: Upload artifact to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: demo-api-${{ steps.artifact.outputs.version }}
        path: ${{ steps.artifact.outputs.jar_path }}
        retention-days: 7
